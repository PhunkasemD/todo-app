<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TODOS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --accent: #c8f04a;
      --accent-dim: #9ab835;
      --text: #f0f0f0;
      --muted: #666;
      --danger: #ff4d4d;
      --done: #3a3a3a;
      --done-text: #555;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 100px;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      width: 100%;
      max-width: 620px;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 48px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 10vw, 80px);
      font-weight: 900;
      line-height: 0.9;
      color: var(--text);
      letter-spacing: -2px;
    }

    h1 span {
      color: var(--accent);
    }

    .stats {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .input-row button {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: var(--radius);
      padding: 14px 22px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .input-row button:hover { background: #d9ff52; }
    .input-row button:active { transform: scale(0.97); }

    /* Filters */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e0e;
    }

    /* Todo list */
    #todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      animation: slideIn 0.2s ease;
      transition: border-color 0.15s, opacity 0.2s;
    }
    .todo-item:hover { border-color: #3a3a3a; }
    .todo-item.done {
      background: #111;
      border-color: #222;
      opacity: 0.6;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-check {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .todo-check:hover { border-color: var(--accent); }
    .todo-item.done .todo-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .todo-check::after {
      content: '';
      display: none;
      width: 6px;
      height: 10px;
      border: 2px solid #0e0e0e;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .todo-item.done .todo-check::after { display: block; }

    .todo-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
      transition: color 0.15s;
    }
    .todo-item.done .todo-text {
      color: var(--done-text);
      text-decoration: line-through;
      text-decoration-color: var(--muted);
    }

    .todo-meta {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    .todo-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .todo-delete:hover { color: var(--danger); background: rgba(255,77,77,0.1); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 13px; line-height: 1.8; }

    /* Clear done button */
    .footer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .clear-btn {
      background: none;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.05em;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--danger); }
    .clear-btn:disabled { opacity: 0.3; cursor: default; }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 28px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 100px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="label">// personal workspace</p>
      <h1>TO<span>.</span><br>DOS</h1>
      <p class="stats" id="stats">0 tasks total</p>
    </header>

    <div class="input-row">
      <input type="text" id="todo-input" placeholder="What needs to be done?" maxlength="200" />
      <button onclick="addTodo()">+ Add</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress</span>
        <span id="progress-text">0 / 0 done</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done')">Done</button>
    </div>

    <div id="todo-list"></div>

    <div class="footer-actions">
      <button class="clear-btn" id="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'todo_app_data';
    let filter = 'all';

    function loadTodos() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function saveTodos(todos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function render() {
      const todos = loadTodos();
      const list = document.getElementById('todo-list');
      const total = todos.length;
      const done = todos.filter(t => t.done).length;
      const active = total - done;

      // Stats
      document.getElementById('stats').textContent =
        `${total} task${total !== 1 ? 's' : ''} — ${active} remaining`;

      // Progress
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${done} / ${total} done`;

      // Clear button
      const clearBtn = document.getElementById('clear-btn');
      clearBtn.disabled = done === 0;

      // Filter
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        const msgs = {
          all: ['Nothing here yet.', 'Add your first task above.'],
          active: ['All caught up!', 'No active tasks.'],
          done: ['Nothing completed yet.', 'Check off some tasks.']
        };
        list.innerHTML = `
          <div class="empty">
            <div class="icon">${filter === 'done' ? '✓' : filter === 'active' ? '⚡' : '◎'}</div>
            <p>${msgs[filter][0]}<br/>${msgs[filter][1]}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}" id="item-${t.id}">
          <div class="todo-check" onclick="toggleTodo('${t.id}')"></div>
          <span class="todo-text">${escapeHtml(t.text)}</span>
          <span class="todo-meta">${formatDate(t.createdAt)}</span>
          <button class="todo-delete" onclick="deleteTodo('${t.id}')" title="Delete">×</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      const todos = loadTodos();
      todos.unshift({ id: Date.now().toString(), text, done: false, createdAt: Date.now() });
      saveTodos(todos);
      input.value = '';
      input.focus();
      render();
    }

    function toggleTodo(id) {
      const todos = loadTodos();
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      saveTodos(todos);
      render();
    }

    function deleteTodo(id) {
      const el = document.getElementById('item-' + id);
      if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all 0.2s'; }
      setTimeout(() => {
        const todos = loadTodos().filter(t => t.id !== id);
        saveTodos(todos);
        render();
      }, 180);
    }

    function clearDone() {
      const todos = loadTodos().filter(t => !t.done);
      saveTodos(todos);
      render();
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === f);
      });
      render();
    }

    // Enter key
    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
