name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Docker image
        run: docker build -t todo-app .

      - name: Run tests
        run: docker run todo-app pytest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker image
        env:
            IMAGE_TAG: dev-${{ github.run_number }}
        run: docker tag todo-app ${{ secrets.DOCKER_USERNAME }}/todo-app:latest

      - name: Push Docker image to Docker Hub
        env:
          IMAGE_TAG: dev-${{ github.run_number }}
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:latest

