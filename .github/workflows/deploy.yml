name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t todo-app .

      - name: Run container test
        run: |
          docker run -d -p 10000:10000 --name todo-app-test todo-app
          sleep 5
          docker logs todo-app-test
          curl -f http://localhost:10000
          docker stop todo-app-test
          docker rm todo-app-test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker image
        env:
          IMAGE_TAG: dev-${{ github.run_number }}
        run: |
          docker tag todo-app ${{ secrets.DOCKER_USERNAME }}/todo-app:latest
          docker tag todo-app ${{ secrets.DOCKER_USERNAME }}/todo-app:$IMAGE_TAG

      - name: Push Docker image to Docker Hub
        env:
          IMAGE_TAG: dev-${{ github.run_number }}
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:$IMAGE_TAG

      # - name: Update Render
      #   run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"